version: "3.8"

services:
  rayders-on-the-storm:
    build: .
    env_file:
      - .env
    volumes:
      - ./input:/app/input
      - ./workflows:/app/workflows
      - ./wordlists:/app/wordlists
      - ./output:/app/output
      - ./gf:/app/gf
    command: ["-w", "/app/workflows/main.yaml"]
    restart: on-failure
