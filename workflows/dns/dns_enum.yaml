vars:
  OUTPUT_PATH: output/vuln
  SUBDOMAINS: output/vuln/subs/all.subs.txt
  IPs: output/vuln/ips/all.ips.txt
  NOTIFY: true

parallel: false
modules:

  - name: create_output_directory
    cmds:
      - mkdir -p {{OUTPUT_PATH}}/dns
  
  - name: dns_enum
    cmds:
      - bash workflows/dns/src/dns_enum.sh {{SUBDOMAINS}} {{OUTPUT_PATH}} {{NOTIFY}}

  - name: revdns_enum
    cmds:
      - bash workflows/dns/src/revdns_enum.sh {{IPs}} {{OUTPUT_PATH}} {{NOTIFY}}
