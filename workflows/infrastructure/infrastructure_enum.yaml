vars:
  INPUT_IPS: ${ROOT}/input/tesla/ips.txt
  IPS_OUTPUT_PATH: ${ROOT}/output/tesla/ips
  SUBDOMAIN_OUTPUT_PATH: ${ROOT}/output/tesla/subs
  INFRASTRUCTURE_NOTIFY: true
  INFRASTRUCTURE_SCRIPTS_FOLDER: ${ROOT}/workflows/infrastructure/src
  INFRASTRUCTURE_WORKFLOWS_FOLDER: ${ROOT}/workflows/infrastructure

parallel: false
modules:

  - name: create_dirs
    cmds:
      - |
        mkdir -p {{IPS_OUTPUT_PATH}}
        touch {{IPS_OUTPUT_PATH}}/all.ips.txt

  - name: copy_ips
    cmds:
      - |
        mkdir -p {{IPS_OUTPUT_PATH}}
        cat {{INPUT_IPS}} | anew {{IPS_OUTPUT_PATH}}/all.ips.txt

  - name: subdomain_resolution
    cmds:
      - python {{INFRASTRUCTURE_SCRIPTS_FOLDER}}/subdomain_resolution.py "{{SUBDOMAIN_OUTPUT_PATH}}" "{{IPS_OUTPUT_PATH}}" "{{INFRASTRUCTURE_NOTIFY}}"

  - name: infrastructure_enum_parallel
    cmds:
      - rayder -q -w {{INFRASTRUCTURE_WORKFLOWS_FOLDER}}/infrastructure_enum_parallel.yaml INPUT_IPS={{INPUT_IPS}} IPS_OUTPUT_PATH={{IPS_OUTPUT_PATH}} SUBDOMAIN_OUTPUT_PATH={{SUBDOMAIN_OUTPUT_PATH}} INFRASTRUCTURE_NOTIFY={{INFRASTRUCTURE_NOTIFY}} INFRASTRUCTURE_SCRIPTS_FOLDER={{INFRASTRUCTURE_SCRIPTS_FOLDER}} INFRASTRUCTURE_WORKFLOWS_FOLDER={{INFRASTRUCTURE_WORKFLOWS_FOLDER}} INFRASTRUCTURE_WORKFLOWS_FOLDER={{INFRASTRUCTURE_WORKFLOWS_FOLDER}}
