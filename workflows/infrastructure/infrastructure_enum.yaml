  - name: shodan_enum
    cmds:
      - |
        mkdir -p {{OUTPUT_PATH}}/ips/shodan
        cat {{OUTPUT_PATH}}/ips/all.ips.txt | \
        parallel -j20 --plus '
          shodan host {} 2>/dev/null | tee {{OUTPUT_PATH}}/ips/shodan/{}.shodan.txt
        '

