parallel: false
modules:

  - name: ip_resolution
    cmds:
      - |
        mkdir -p {{OUTPUT_PATH}}/ips
        cat {{OUTPUT_PATH}}/subs/all.subs.txt | \
        parallel -j50 'host {} 2>/dev/null | grep "has address" | tail -1 | awk "{print \$4}"' | \
        grep -v '^$' | anew {{OUTPUT_PATH}}/ips/all.resolved.ips.txt | anew {{OUTPUT_PATH}}/ips/all.ips.txt
  
  ##### Validate if the scope allows all of they ASN IPs before enabling this module #####

