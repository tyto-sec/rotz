vars:
  ROOT: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2
  TARGET: hackthissite
  INPUT_ORGANIZATION: HackThisSite
  INPUT_DOMAINS: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/input/hackthissite/domains.txt
  SUBDOMAIN_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/subs
  SUBDOMAIN_OUTPUT_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/subs/all.subs.txt
  LIVE_SUBDOOMAINS_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/subs/all.live.subs.txt
  SUBDOMAIN_WORDLIST: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/wordlists/subdomains/subdomains-top1million-5000.txt
  SUBDOMAIN_SCRIPTS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/subdomains/src
  SUBDOMAIN_WORKFLOWS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/subdomains
  IPS_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/ips
  IPS_OUTPUT_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/ips/all.ips.txt
  INFRASTRUCTURE_SCRIPTS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/infrastructure/src
  INFRASTRUCTURE_WORKFLOWS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/infrastructure
  DNS_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/dns
  DNS_SCRIPTS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/dns/src
  DNS_WORKFLOWS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/dns
  SUBDOMAIN_RESOLUTION_SCRIPTS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/probing/src
  SUBDOMAIN_RESOLUTION_WORKFLOWS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/probing
  CONTENT_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content
  CONTENT_SCRIPTS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/content/src
  CONTENT_WORKFLOWS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/content
  ALL_URLS_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/urls/all.urls.txt
  CLEANED_URLS_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/urls/all.cleaned.urls.txt
  GAU_URLS_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/urls/all.gau.urls.txt
  KATANA_URLS_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/urls/all.katana.urls.txt
  PARAMS_URLS_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/urls/all.params.urls.txt
  JS_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/javascript
  JS_URLS_FILE: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/urls/all.js.urls.txt
  SELECTED_JS_FILES: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/javascript/all.javascript.txt
  JS_DOWNLOAD_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/javascript/downloads
  JS_SCRIPTS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/javascript/src
  JS_WORKFLOWS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/javascript
  JS_REGEX_FILE: /opt/JSScanner/Regex.txt
  FUZZING_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/fuzzing
  GIT_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/fuzzing/git
  CEWL_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/wordlists/cewl
  WORDLISTS_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/wordlists
  DIRECTORY_WORDLIST: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/wordlists/directories/fuzz-Bo0oM.txt
  PATH_WORDLIST: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/wordlists/all.paths.txt
  WORDS_WORDLIST: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/wordlists/all.words.txt
  FUZZING_SCRIPTS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/fuzzing/src
  FUZZING_WORKFLOWS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/fuzzing
  VULNERABILITY_OUTPUT_PATH: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/output/hackthissite/content/vuln
  VULNERABILITY_SCRIPTS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/vulns/src
  VULNERABILITY_WORKFLOWS_FOLDER: /mnt/hgfs/Mega/Github/Pentest/Recon/RaydersOnTheStorm-v2/workflows/vulns
  SUBDOMAIN_NOTIFY: true
  SUBDOMAIN_BRUTEFORCE: true
  ORGANIZATION_SCAN: false
  ORGANIZATION_NOTIFY: true
  DNS_NOTIFY: true
  SUBDOMAIN_RESOLUTION_NOTIFY: true
  CONTENT_NOTIFY: true
  CONTENT_ACTIVE: true
  JS_NOTIFY: true
  JS_ACTIVE: true
  JS_NUCLEI: true
  JS_DOWNLOAD: true
  FUZZING_ACTIVE: true
  FUZZING_NOTIFY: true
parallel: false
modules:
- name: subdomain_enum
  cmds:
  - rayder -q -w {{SUBDOMAIN_WORKFLOWS_FOLDER}}/subdomain_enum.yaml INPUT_DOMAINS={{INPUT_DOMAINS}}
    SUBDOMAIN_OUTPUT_PATH={{SUBDOMAIN_OUTPUT_PATH}} SUBDOMAIN_NOTIFY={{SUBDOMAIN_NOTIFY}}
    SUBDOMAIN_BRUTEFORCE={{SUBDOMAIN_BRUTEFORCE}} SUBDOMAIN_WORDLIST={{SUBDOMAIN_WORDLIST}}
    SUBDOMAIN_SCRIPTS_FOLDER={{SUBDOMAIN_SCRIPTS_FOLDER}} SUBDOMAIN_WORKFLOWS_FOLDER={{SUBDOMAIN_WORKFLOWS_FOLDER}}
- name: organization_enum
  cmds:
  - if [ "{{ORGANIZATION_SCAN}}" = "true" ]; then rayder -q -w {{ORGANIZATION_WORKFLOWS_FOLDER}}/organization_enum.yaml
    INPUT_DOMAINS={{INPUT_DOMAINS}} INPUT_ORGANIZATION={{INPUT_ORGANIZATION}} IPS_OUTPUT_PATH={{IPS_OUTPUT_PATH}}
    ORGANIZATION_NOTIFY={{ORGANIZATION_NOTIFY}} ORGANIZATION_WORKFLOWS_FOLDER={{ORGANIZATION_WORKFLOWS_FOLDER}}
    ORGANIZATION_SCRIPTS_FOLDER={{ORGANIZATION_SCRIPTS_FOLDER}} ; fi
- name: infrastructure_enum
  cmds:
  - rayder -q -w {{INFRASTRUCTURE_WORKFLOWS_FOLDER}}/infrastructure_enum.yaml IPS_OUTPUT_PATH={{IPS_OUTPUT_PATH}}
    SUBDOMAIN_OUTPUT_PATH={{SUBDOMAIN_OUTPUT_PATH}} INFRASTRUCTURE_SCRIPTS_FOLDER={{INFRASTRUCTURE_SCRIPTS_FOLDER}}
    INFRASTRUCTURE_WORKFLOWS_FOLDER={{INFRASTRUCTURE_WORKFLOWS_FOLDER}}
- name: dns_enum
  cmds:
  - rayder -q -w {{DNS_WORKFLOWS_FOLDER}}/dns_enum.yaml INPUT_DOMAINS={{INPUT_DOMAINS}}
    SUBDOMAIN_OUTPUT_FILE={{SUBDOMAIN_OUTPUT_FILE}} IPS_OUTPUT_FILE={{IPS_OUTPUT_FILE}}
    DNS_OUTPUT_PATH={{DNS_OUTPUT_PATH}} DNS_NOTIFY={{DNS_NOTIFY}} DNS_SCRIPTS_FOLDER={{DNS_SCRIPTS_FOLDER}}
    DNS_WORKFLOWS_FOLDER={{DNS_WORKFLOWS_FOLDER}}
- name: subdomain_resolution
  cmds:
  - rayder -q -w {{SUBDOMAIN_RESOLUTION_WORKFLOWS_FOLDER}}/subdomain_resolution.yaml
    SUBDOMAIN_OUTPUT_FILE={{SUBDOMAIN_OUTPUT_FILE}} SUBDOMAIN_OUTPUT_PATH={{SUBDOMAIN_OUTPUT_PATH}}
    SUBDOMAIN_RESOLUTION_NOTIFY={{SUBDOMAIN_RESOLUTION_NOTIFY}} SUBDOMAIN_RESOLUTION_SCRIPTS_FOLDER={{SUBDOMAIN_RESOLUTION_SCRIPTS_FOLDER}}
    SUBDOMAIN_RESOLUTION_WORKFLOWS_FOLDER={{SUBDOMAIN_RESOLUTION_WORKFLOWS_FOLDER}}
- name: content_enumeration
  cmds:
  - rayder -q -w {{CONTENT_WORKFLOWS_FOLDER}}/content_enumeration.yaml LIVE_SUBDOOMAINS_FILE={{LIVE_SUBDOOMAINS_FILE}}
    ALL_URLS_FILE={{ALL_URLS_FILE}} GAU_URLS_FILE={{GAU_URLS_FILE}} KATANA_URLS_FILE={{KATANA_URLS_FILE}}
    PARAMS_URLS_FILE={{PARAMS_URLS_FILE}} JS_URLS_FILE={{JS_URLS_FILE}} CLEANED_URLS_FILE={{CLEANED_URLS_FILE}}
    CONTENT_OUTPUT_PATH={{CONTENT_OUTPUT_PATH}} CONTENT_NOTIFY={{CONTENT_NOTIFY}}
    CONTENT_ACTIVE={{CONTENT_ACTIVE}} CONTENT_SCRIPTS_FOLDER={{CONTENT_SCRIPTS_FOLDER}}
    CONTENT_WORKFLOWS_FOLDER={{CONTENT_WORKFLOWS_FOLDER}}
- name: javascript_enum
  cmds:
  - rayder -q -w {{JS_WORKFLOWS_FOLDER}}/javascript_enum.yaml JS_URLS_FILE={{JS_URLS_FILE}}
    SELECTED_JS_FILES={{SELECTED_JS_FILES}} JS_OUTPUT_PATH={{JS_OUTPUT_PATH}} JS_NOTIFY={{JS_NOTIFY}}
    JS_ACTIVE={{JS_ACTIVE}} JS_NUCLEI={{JS_NUCLEI}} JS_DOWNLOAD={{JS_DOWNLOAD}} JS_DOWNLOAD_FOLDER={{JS_DOWNLOAD_FOLDER}}
    JS_SCRIPTS_FOLDER={{JS_SCRIPTS_FOLDER}} JS_WORKFLOWS_FOLDER={{JS_WORKFLOWS_FOLDER}}
    JS_REGEX_FILE={{JS_REGEX_FILE}} SUBDOMAIN_OUTPUT_FILE={{SUBDOMAIN_OUTPUT_FILE}}
    ALL_URLS_FILE={{ALL_URLS_FILE}}
- name: fuzzing
  cmds:
  - rayder -q -w {{FUZZING_WORKFLOWS_FOLDER}}/fuzzing.yaml FUZZING_OUTPUT_PATH={{FUZZING_OUTPUT_PATH}}
    GIT_OUTPUT_PATH={{GIT_OUTPUT_PATH}} CEWL_OUTPUT_PATH={{CEWL_OUTPUT_PATH}} WORDLISTS_OUTPUT_PATH={{WORDLISTS_OUTPUT_PATH}}
    LIVE_SUBDOOMAINS_FILE={{LIVE_SUBDOOMAINS_FILE}} SUBDOMAIN_WORDLIST={{SUBDOMAIN_WORDLIST}}
    DIRECTORY_WORDLIST={{DIRECTORY_WORDLIST}} PATH_WORDLIST={{PATH_WORDLIST}} WORDS_WORDLIST={{WORDS_WORDLIST}}
    ALL_URLS_FILE={{ALL_URLS_FILE}} FUZZING_ACTIVE={{FUZZING_ACTIVE}} FUZZING_NOTIFY={{FUZZING_NOTIFY}}
    FUZZING_SCRIPTS_FOLDER={{FUZZING_SCRIPTS_FOLDER}} FUZZING_WORKFLOWS_FOLDER={{FUZZING_WORKFLOWS_FOLDER}}
- name: vulnerability_scan
  cmds:
  - rayder -q -w {{VULNERABILITY_WORKFLOWS_FOLDER}}/vulnerability_scan.yaml VULNERABILITY_OUTPUT_PATH={{VULNERABILITY_OUTPUT_PATH}}
    CLEANED_URLS_FILE={{CLEANED_URLS_FILE}} VULNERABILITY_SCRIPTS_FOLDER={{VULNERABILITY_SCRIPTS_FOLDER}}
    VULNERABILITY_WORKFLOWS_FOLDER={{VULNERABILITY_WORKFLOWS_FOLDER}}
