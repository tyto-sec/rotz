vars:
  OUTPUT_PATH: output/tesla
  DOMAINS: input/tesla/domains.txt

parallel: true
modules:

  - name: subfinder_enum
    cmds:
      - bash workflows/subdomains/src/subfinder_enum.sh '{{DOMAINS}}' '{{OUTPUT_PATH}}'
  
  - name: chaos_enum
    cmds:
      - bash workflows/subdomains/src/chaos_enum.sh '{{DOMAINS}}' '{{OUTPUT_PATH}}'

  - name: github_enum
    cmds:
      - bash workflows/subdomains/src/github_enum.sh '{{DOMAINS}}' '{{OUTPUT_PATH}}'