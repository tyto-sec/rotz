vars:
  SUBDOMAIN_OUTPUT_PATH: ${ROOT}/output/hackthissite/subs
  INPUT_DOMAINS: ${ROOT}/input/hackthissite/domains.txt
  SUBDOMAIN_NOTIFY: true
  SUBDOMAIN_BRUTEFORCE: true
  WORDLIST: ${ROOT}/wordlists/subdomains/subdomains-top1million-5000.txt

parallel: false
modules:

  - name: create_dirs
    cmds:
      - |
        mkdir -p {{SUBDOMAIN_OUTPUT_PATH}}
        touch {{SUBDOMAIN_OUTPUT_PATH}}/all.subs.txt

  - name: subfinder_enum
    cmds:
      - bash workflows/subdomains/src/subfinder_enum.sh '{{INPUT_DOMAINS}}' '{{SUBDOMAIN_OUTPUT_PATH}}' '{{SUBDOMAIN_NOTIFY}}'
  
  - name: chaos_enum
    cmds:
      - bash workflows/subdomains/src/chaos_enum.sh '{{INPUT_DOMAINS}}' '{{SUBDOMAIN_OUTPUT_PATH}}' '{{SUBDOMAIN_NOTIFY}}'

  - name: github_enum
    cmds:
      - bash workflows/subdomains/src/github_enum.sh '{{INPUT_DOMAINS}}' '{{SUBDOMAIN_OUTPUT_PATH}}' '{{SUBDOMAIN_NOTIFY}}'

  - name: puredns_enum
    cmds:
      - if {{SUBDOMAIN_BRUTEFORCE}}; then bash workflows/subdomains/src/puredns_enum.sh '{{INPUT_DOMAINS}}' '{{SUBDOMAIN_OUTPUT_PATH}}' '{{SUBDOMAIN_NOTIFY}}' '{{WORDLIST}}'; fi

  - name: clean_all_subs
    cmds:
      - python3 workflows/subdomains/src/clean_domains.py {{SUBDOMAIN_OUTPUT_PATH}}/all.subs.txt
