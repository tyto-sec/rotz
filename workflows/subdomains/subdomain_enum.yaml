vars:
  OUTPUT_PATH: output/vuln
  DOMAINS: input/vuln/domains.txt
  NOTIFY: true
  ACTIVE: false
  WORDLIST: wordlists/subdomains/subdomains-top1million-5000.txt
  RECURSION: false

parallel: false
modules:

  - name: create_dirs
    cmds:
      - |
        mkdir -p {{OUTPUT_PATH}}/subs
        touch {{OUTPUT_PATH}}/subs/all.subs.txt

  - name: subfinder_enum
    cmds:
      - bash workflows/subdomains/src/subfinder_enum.sh '{{DOMAINS}}' '{{OUTPUT_PATH}}' '{{NOTIFY}}'
  
  - name: chaos_enum
    cmds:
      - bash workflows/subdomains/src/chaos_enum.sh '{{DOMAINS}}' '{{OUTPUT_PATH}}' '{{NOTIFY}}'

  - name: github_enum
    cmds:
      - bash workflows/subdomains/src/github_enum.sh '{{DOMAINS}}' '{{OUTPUT_PATH}}' '{{NOTIFY}}'

  - name: puredns_enum
    cmds:
      - if {{ACTIVE}}; then bash workflows/subdomains/src/puredns_enum.sh '{{DOMAINS}}' '{{OUTPUT_PATH}}' '{{NOTIFY}}' '{{WORDLIST}}'; fi

  - name: clean_all_subs
    cmds:
      - python3 workflows/subdomains/src/clean_domains.py {{OUTPUT_PATH}}/subs/all.subs.txt

  - name: subfinder_recursive_enum
    cmds:
      - if {{RECURSION}}; then bash workflows/subdomains/src/subfinder_enum.sh '{{OUTPUT_PATH}}/subs/all.subs.txt' '{{OUTPUT_PATH}}'; fi
  
  - name: chaos_recursive_enum
    cmds:
      - if {{RECURSION}}; then bash workflows/subdomains/src/chaos_enum.sh '{{OUTPUT_PATH}}/subs/all.subs.txt' '{{OUTPUT_PATH}}'; fi