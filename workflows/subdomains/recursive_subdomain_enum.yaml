vars:
  DOMAINS_PATH: "domains/domains.txt"
  OUTPUT_PATH: "output"

parallel: true
modules:

  - name: subfinder_recursive_enum
    cmds:
      - |
        echo "[*] Recursive Subfinder subdomain enumeration:)"
        cat {{OUTPUT_PATH}}/subs/all.subs.txt | sort -u | \
        parallel -j64 --plus '
          subfinder -d {} -silent -t 100 -all | grep -v "*" | \
          anew {{OUTPUT_PATH}}/subs/recursive/subfinder.recursive.subs.txt | \
          anew {{OUTPUT_PATH}}/subs/all.subs.txt
        '
  
  - name: chaos_recursive_enum
    cmds:
      - |
        echo "[*]  Recursive Chaos subdomain enumeration:)"
        cat {{OUTPUT_PATH}}/subs/all.subs.txt | sort -u | \
        parallel -j64 --plus '
          chaos -d {} -silent | grep -v "*" | \
          anew {{OUTPUT_PATH}}/subs/recursive/chaos.recursive.subs.txt | \
          anew {{OUTPUT_PATH}}/subs/all.subs.txt
        '