vars:
  JS_URLS_FILE: ${ROOT}/output/tesla/content/urls/all.js.urls.txt
  SELECTED_JS_FILES: ${ROOT}/output/tesla/content/javascript/all.javascript.txt
  JS_OUTPUT_PATH: ${ROOT}/output/tesla/content/javascript
  JS_NOTIFY: true
  JS_ACTIVE: true
  JS_NUCLEI: true
  JS_DOWNLOAD: true
  JS_DOWNLOAD_FOLDER: ${ROOT}/output/tesla/content/javascript/downloads
  JS_SCRIPTS_FOLDER: ${ROOT}/workflows/javascript/src
  JS_WORKFLOWS_FOLDER: ${ROOT}/workflows/javascript
  JS_REGEX_FILE: /opt/JSScanner/Regex.txt
  SUBDOMAIN_OUTPUT_FILE: ${ROOT}/output/tesla/subs/all.subs.txt
  ALL_URLS_FILE: ${ROOT}/output/tesla/content/urls/all.urls.txt

parallel: false
modules:

    - name: dir_creation
      cmds: 
      - mkdir -p {{JS_OUTPUT_PATH}} && touch {{SELECTED_JS_FILES}}

    - name: subjs_enum
      cmds: 
      - python {{JS_SCRIPTS_FOLDER}}/subjs_enum.py "{{JS_URLS_FILE}}" "{{JS_OUTPUT_PATH}}" "{{SUBDOMAIN_OUTPUT_FILE}}"

    - name: katana_enum
      cmds: 
      - if {{JS_ACTIVE}}; then python {{JS_SCRIPTS_FOLDER}}/katana_js_enum.py "{{JS_URLS_FILE}}" "{{SELECTED_JS_FILES}}" "{{SUBDOMAIN_OUTPUT_FILE}}" "{{ALL_URLS_FILE}}"; fi

    - name: jsscanner_enum
      cmds: 
      - python3 {{JS_SCRIPTS_FOLDER}}/jsscanner_enum.py "{{SELECTED_JS_FILES}}" "{{JS_OUTPUT_PATH}}" "{{JS_REGEX_FILE}}"

    - name: download_javascript
      cmds:
      - if {{JS_DOWNLOAD}}; then python {{JS_SCRIPTS_FOLDER}}/download_js_files.py "{{SELECTED_JS_FILES}}" "{{JS_DOWNLOAD_FOLDER}}"; fi

    - name: nuclei_enum
      cmds: 
      - if {{JS_NUCLEI}}; then python {{JS_SCRIPTS_FOLDER}}/nuclei_js_scan.py "{{SELECTED_JS_FILES}}" "{{JS_OUTPUT_PATH}}" "{{JS_NOTIFY}}"; fi
