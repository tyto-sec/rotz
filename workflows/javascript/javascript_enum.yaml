vars:
  OUTPUT_PATH: output/vuln
  LIVE_URLS: output/vuln/content/urls/all.live.urls.txt
  JAVASCRIPT: output/vuln/content/javascript/all.javascript.txt
  NOTIFY: true
  ACTIVE: false
  RECURSION: false
  NUCLEI: false
  JAVASCRIPT_DOWNLOAD: false

parallel: false
modules:

    - name: dir_creation
      cmds: 
      - mkdir -p {{OUTPUT_PATH}}/content/javascript && touch {{OUTPUT_PATH}}/content/javascript/all.javascript.txt

    - name: subjs_enum
      cmds: 
      - bash workflows/javascript/src/subjs_enum.sh '{{LIVE_URLS}}' '{{OUTPUT_PATH}}'

    - name: katana_enum
      cmds: 
      - if {{ACTIVE}}; then bash workflows/javascript/src/katana_js_enum.sh '{{JAVASCRIPT}}' '{{OUTPUT_PATH}}'; fi

    - name: linkfinder_enum
      cmds: 
      - bash workflows/javascript/src/linkfinder_enum.sh '{{JAVASCRIPT}}' '{{OUTPUT_PATH}}'

    - name: subjs_enum
      cmds: 
      - bash workflows/javascript/src/subjs_enum.sh '{{LIVE_URLS}}' '{{OUTPUT_PATH}}'

    - name: katana_enum
      cmds: 
      - if {{ACTIVE}} and {{RECURSION}}; then bash workflows/javascript/src/katana_js_enum.sh '{{JAVASCRIPT}}' '{{OUTPUT_PATH}}'; fi

    - name: linkfinder_enum
      cmds: 
      - if {{RECURSION}}; then bash workflows/javascript/src/linkfinder_enum.sh '{{JAVASCRIPT}}' '{{OUTPUT_PATH}}'; fi

    - name: subjs_enum
      cmds: 
      - if {{RECURSION}}; then bash workflows/javascript/src/subjs_enum.sh '{{LIVE_URLS}}' '{{OUTPUT_PATH}}'; fi

    - name: katana_enum
      cmds: 
      - if {{ACTIVE}} and {{RECURSION}}; then bash workflows/javascript/src/katana_js_enum.sh '{{JAVASCRIPT}}' '{{OUTPUT_PATH}}'; fi

    - name: jsscanner_enum
      cmds: 
      - bash workflows/javascript/src/jsscanner_enum.sh '{{JAVASCRIPT}}' '{{OUTPUT_PATH}}'

    - name: download_javascript
      cmds:
      - if {{JAVASCRIPT_DOWNLOAD}}; then bash workflows/javascript/src/download_js_files.sh '{{JAVASCRIPT}}' '{{OUTPUT_PATH}}'; fi

    # - name: arjun_enum
    #   cmds: 
    #   - if {{ACTIVE}} and {{RECURSION}}; then bash workflows/content/src/arjun_enum.sh '{{LIVE_URLS}}' '{{OUTPUT_PATH}}'; fi
    
    - name: uro_cleaning
      cmds: 
      - bash workflows/content/src/uro_cleaning.sh '{{LIVE_URLS}}' '{{OUTPUT_PATH}}'

    - name: unfurl_enum
      cmds: 
      - bash workflows/content/src/unfurl_enum.sh '{{OUTPUT_PATH}}'

    - name: nuclei_enum
      cmds: 
      - if {{NUCLEI}}; then bash workflows/javascript/src/nuclei_js_scan.sh '{{JAVASCRIPT}}' '{{OUTPUT_PATH}}' '{{NOTIFY}}'; fi
