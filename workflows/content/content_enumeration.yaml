vars:
  CONTENT_OUTPUT_PATH: ${ROOT}/output/tesla/content
  LIVE_SUBDOOMAINS_FILE: ${ROOT}/output/tesla/subs/all.live.subs.txt
  LIVE_URLS_FILE: ${ROOT}/output/tesla/content/urls/all.urls.txt
  ALL_URLS_FILE: ${ROOT}/output/tesla/content/urls/all.urls.txt
  CONTENT_NOTIFY: true
  CONTENT_ACTIVE: true
  CONTENT_SCRIPTS_FOLDER: ${ROOT}/workflows/content/src
  CONTENT_WORKFLOWS_FOLDER: ${ROOT}/workflows/content

parallel: false
modules:

  - name: dir_creation
    cmds: 
    - |
      mkdir -p {{CONTENT_OUTPUT_PATH}}/urls 
      mkdir -p {{CONTENT_OUTPUT_PATH}}/tmp
      mkdir -p {{CONTENT_OUTPUT_PATH}}/screenshots
      mkdir -p {{CONTENT_OUTPUT_PATH}}/wordlists
      touch {{CONTENT_OUTPUT_PATH}}/urls/all.urls.txt

  - name: gowitness_screenshots
    cmds: 
    - python3 {{CONTENT_SCRIPTS_FOLDER}}/gowitness_screenshots.py "{{LIVE_SUBDOOMAINS_FILE}}" "{{CONTENT_OUTPUT_PATH}}" 

  - name: gowitness_enum
    cmds: 
    - python3 {{CONTENT_SCRIPTS_FOLDER}}/gowitness_enum.py "{{LIVE_SUBDOOMAINS_FILE}}" "{{CONTENT_OUTPUT_PATH}}"

  - name: aquatone_screenshots
    cmds: 
    - python3 {{CONTENT_SCRIPTS_FOLDER}}/aquatone_screenshots.py "{{LIVE_SUBDOOMAINS_FILE}}" "{{CONTENT_OUTPUT_PATH}}"

