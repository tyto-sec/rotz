vars:
  OUTPUT_PATH: output/vuln
  SUBDOMAINS: output/vuln/subs/all.live.subs.txt
  URLS: output/vuln/content/urls/all.urls.txt
  NOTIFY: true
  ACTIVE: false

parallel: true
modules:

  - name: dir_creation
    cmds: 
    - | 
      mkdir -p {{OUTPUT_PATH}}/content/urls 
      mkdir -p {{OUTPUT_PATH}}/content/tmp
      mkdir -p {{OUTPUT_PATH}}/content/screenshots
      mkdir -p {{OUTPUT_PATH}}/content/wordlists
      touch {{OUTPUT_PATH}}/content/urls/all.urls.txt

  - name: gowitness_screenshots
    cmds: 
    - bash workflows/content/src/gowitness_screenshots.sh '{{SUBDOMAINS}}' '{{OUTPUT_PATH}}'

  - name: gowitness_enum
    cmds: 
    - bash workflows/content/src/gowitness_enum.sh '{{SUBDOMAINS}}' '{{OUTPUT_PATH}}'

  - name: aquatone_screenshots
    cmds: 
    - bash workflows/content/src/aquatone_screenshots.sh '{{SUBDOMAINS}}' '{{OUTPUT_PATH}}'

  - name: gau_enum
    cmds: 
    - bash workflows/content/src/gau_enum.sh '{{SUBDOMAINS}}' '{{OUTPUT_PATH}}' 

  - name: katana_enum
    cmds: 
    - if {{ACTIVE}}; then bash workflows/content/src/katana_enum.sh '{{SUBDOMAINS}}' '{{OUTPUT_PATH}}'; fi

  - name: paramspider_enum
    cmds: 
    - bash workflows/content/src/paramspider_enum.sh '{{SUBDOMAINS}}' '{{OUTPUT_PATH}}'

  - name: arjun_enum
    cmds: 
    - if {{ACTIVE}}; then bash workflows/content/src/arjun_enum.sh '{{URLS}}' '{{OUTPUT_PATH}}'; fi

  - name: httpx_resolution
    cmds: 
    - bash workflows/content/src/httpx_resolution.sh '{{URLS}}' '{{OUTPUT_PATH}}'

  - name: uro_cleaning
    cmds: 
    - bash workflows/content/src/uro_cleaning.sh '{{URLS}}' '{{OUTPUT_PATH}}'

  - name: unfurl_enum
    cmds: 
    - bash workflows/content/src/unfurl_enum.sh '{{OUTPUT_PATH}}'