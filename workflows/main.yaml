vars:
  INPUT_DOMAINS: ${ROOT}/input/hackthissite/domains.txt
  INPUT_ORGANIZATION: "HackThisSite"

  SUBDOMAIN_OUTPUT_PATH: ${ROOT}/output/hackthissite/subs
  SUBDOMAIN_OUTPUT_FILE: ${ROOT}/output/hackthissite/subs/all.subs.txt
  SUBDOMAIN_NOTIFY: true
  SUBDOMAIN_BRUTEFORCE: true
  SUBDOMAIN_WORDLIST: ${ROOT}/wordlists/subdomains/subdomains-top1million-5000.txt
  SUBDOMAIN_SCRIPTS_FOLDER: ${ROOT}/workflows/subdomains/src
  SUBDOMAIN_WORKFLOWS_FOLDER: ${ROOT}/workflows/subdomains

  ORGANIZATION_NOTIFY: false
  ORGANIZATION_WORKFLOWS_FOLDER: ${ROOT}/workflows/organization
  ORGANIZATION_SCRIPTS_FOLDER: ${ROOT}/workflows/organization/src
  ORGANIZATION_SCAN: false

  IPS_OUTPUT_PATH: ${ROOT}/output/hackthissite/ips
  IPS_OUTPUT_FILE: ${ROOT}/output/hackthissite/ips/all.ips.txt
  INFRASTRUCTURE_SCRIPTS_FOLDER: ${ROOT}/workflows/infrastructure/src
  INFRASTRUCTURE_WORKFLOWS_FOLDER: ${ROOT}/workflows/infrastructure
  
  DNS_OUTPUT_PATH: ${ROOT}/output/hackthissite/dns
  DNS_NOTIFY: true
  DNS_SCRIPTS_FOLDER: ${ROOT}/workflows/dns/src
  DNS_WORKFLOWS_FOLDER: ${ROOT}/workflows/dns

  SUBDOMAIN_RESOLUTION_NOTIFY: true
  SUBDOMAIN_RESOLUTION_SCRIPTS_FOLDER: ${ROOT}/workflows/probing/src
  SUBDOMAIN_RESOLUTION_WORKFLOWS_FOLDER: ${ROOT}/workflows/probing
  LIVE_SUBDOOMAINS_FILE: ${ROOT}/output/hackthissite/subs/all.live.subs.txt

  OUTPUT_PATH: "/app/output/vuln4"
  DOMAINS: "/app/input/vuln/domains.txt"
  IPS: "/app/input/vuln/ips.txt"
  ORGANIZATION: "vulnweb"
  LIVE_SUBS: "/app/output/vuln4/subs/all.live.subs.txt"
  SUBDOMAINS: "/app/output/vuln4/subs/all.subs.txt"
  URLS: "/app/output/vuln4/content/urls/all.urls.txt"
  LIVE_URLS: "/app/output/vuln4/content/urls/all.live.urls.txt"
  JAVASCRIPT: "/app/output/vuln4/content/javascript/all.javascript.txt"
  FUZZING_URLS: "/app/output/vuln4/content/urls/fuzzing/ffuf.urls.txt"
  PATH_WORDLIST: "/app/output/vuln4/content/wordlists/all.paths.txt"
  WORDS_WORDLIST: "/app/output/vuln4/content/wordlists/fuzzing.word.list"
  SUBDOMAINS_WORDLIST: "/app/wordlists/subdomains/subdomains-top1million-5000.txt"
  NOTIFY: true
  ACTIVE: true
  RECURSION: true
  NUCLEI: true
  JAVASCRIPT_DOWNLOAD: true

parallel: false
modules:

  - name: subdomain_enum
    cmds:
      - rayder -q -w {{SUBDOMAIN_WORKFLOWS_FOLDER}}/subdomain_enum.yaml INPUT_DOMAINS={{INPUT_DOMAINS}} SUBDOMAIN_OUTPUT_PATH={{SUBDOMAIN_OUTPUT_PATH}} SUBDOMAIN_NOTIFY={{SUBDOMAIN_NOTIFY}} SUBDOMAIN_BRUTEFORCE={{SUBDOMAIN_BRUTEFORCE}} SUBDOMAIN_WORDLIST={{SUBDOMAIN_WORDLIST}} SUBDOMAIN_SCRIPTS_FOLDER={{SUBDOMAIN_SCRIPTS_FOLDER}} SUBDOMAIN_WORKFLOWS_FOLDER={{SUBDOMAIN_WORKFLOWS_FOLDER}}

  - name: organization_enum
    cmds:
      - if [ "{{ORGANIZATION_SCAN}}" = "true" ]; then rayder -q -w {{ORGANIZATION_WORKFLOWS_FOLDER}}/organization_enum.yaml INPUT_DOMAINS={{INPUT_DOMAINS}} INPUT_ORGANIZATION={{INPUT_ORGANIZATION}} IPS_OUTPUT_PATH={{IPS_OUTPUT_PATH}} ORGANIZATION_NOTIFY={{ORGANIZATION_NOTIFY}} ORGANIZATION_WORKFLOWS_FOLDER={{ORGANIZATION_WORKFLOWS_FOLDER}} ORGANIZATION_SCRIPTS_FOLDER={{ORGANIZATION_SCRIPTS_FOLDER}} ; fi

  - name: infrastructure_enum
    cmds:
      - rayder -q -w {{INFRASTRUCTURE_WORKFLOWS_FOLDER}}/infrastructure_enum.yaml INPUT_IPS={{INPUT_IPS}} IPS_OUTPUT_PATH={{IPS_OUTPUT_PATH}} SUBDOMAIN_OUTPUT_PATH={{SUBDOMAIN_OUTPUT_PATH}} INFRASTRUCTURE_NOTIFY={{NOTIFY}} INFRASTRUCTURE_SCRIPTS_FOLDER={{INFRASTRUCTURE_SCRIPTS_FOLDER}} INFRASTRUCTURE_WORKFLOWS_FOLDER={{INFRASTRUCTURE_WORKFLOWS_FOLDER}} INFRASTRUCTURE_WORKFLOWS_FOLDER={{INFRASTRUCTURE_WORKFLOWS_FOLDER}}

  - name: dns_enum
    cmds:
      - rayder -q -w {{DNS_WORKFLOWS_FOLDER}}/dns_enum.yaml INPUT_DOMAINS={{INPUT_DOMAINS}} SUBDOMAIN_OUTPUT_FILE={{SUBDOMAIN_OUTPUT_FILE}} IPS_OUTPUT_FILE={{IPS_OUTPUT_FILE}} DNS_OUTPUT_PATH={{DNS_OUTPUT_PATH}} DNS_NOTIFY={{DNS_NOTIFY}} DNS_SCRIPTS_FOLDER={{DNS_SCRIPTS_FOLDER}} DNS_WORKFLOWS_FOLDER={{DNS_WORKFLOWS_FOLDER}}  
  
  - name: subdomain_resolution
    cmds:
      - rayder -q -w {{SUBDOMAIN_RESOLUTION_WORKFLOWS_FOLDER}}/subdomain_resolution.yaml SUBDOMAIN_OUTPUT_FILE={{SUBDOMAIN_OUTPUT_FILE}} SUBDOMAIN_OUTPUT_PATH={{SUBDOMAIN_OUTPUT_PATH}} SUBDOMAIN_RESOLUTION_NOTIFY={{SUBDOMAIN_RESOLUTION_NOTIFY}} SUBDOMAIN_RESOLUTION_SCRIPTS_FOLDER={{SUBDOMAIN_RESOLUTION_SCRIPTS_FOLDER}} SUBDOMAIN_RESOLUTION_WORKFLOWS_FOLDER={{SUBDOMAIN_RESOLUTION_WORKFLOWS_FOLDER}}
  
  # - name: content_enumeration
  #   cmds:
  #     - rayder -q -w workflows/content/content_enumeration.yaml OUTPUT_PATH={{OUTPUT_PATH}} LIVE_SUBS={{LIVE_SUBS}} URLS={{URLS}} NOTIFY={{NOTIFY}} ACTIVE={{ACTIVE}}
  
  # - name: javascript_enum
  #   cmds:
  #     - rayder -q -w workflows/javascript/javascript_enum.yaml OUTPUT_PATH={{OUTPUT_PATH}} LIVE_URLS={{LIVE_URLS}} JAVASCRIPT={{JAVASCRIPT}} NOTIFY={{NOTIFY}} ACTIVE={{ACTIVE}} RECURSION={{RECURSION}} NUCLEI={{NUCLEI}} JAVASCRIPT_DOWNLOAD={{JAVASCRIPT_DOWNLOAD}}

  # - name: fuzzing
  #   cmds:
  #     - rayder -q -w workflows/fuzzing/fuzzing.yaml OUTPUT_PATH={{OUTPUT_PATH}} LIVE_SUBS={{LIVE_SUBS}} FUZZING_URLS={{FUZZING_URLS}} PATH_WORDLIST={{PATH_WORDLIST}} WORDS_WORDLIST={{WORDS_WORDLIST}} SUBDOMAINS_WORDLIST={{SUBDOMAINS_WORDLIST}} ACTIVE={{ACTIVE}} NOTIFY={{NOTIFY}}

  # - name: vulnerability_scan
  #   cmds:
  #     - rayder -q -w workflows/vulns/vulnerability_scan.yaml OUTPUT_PATH={{OUTPUT_PATH}} LIVE_URLS={{LIVE_URLS}} ACTIVE={{ACTIVE}} NOTIFY={{NOTIFY}}
