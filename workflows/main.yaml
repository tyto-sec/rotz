vars:
  DOMAINS_PATH: "domains/domains.txt"
  OUTPUT_PATH: "output"
  ORGANIZATION: "nasa"

parallel: false
modules:

  - name: subdomain_enum
    cmds:
      - rayder -q -w workflows/subdomains/subdomain_enum.yaml DOMAINS_PATH={{DOMAINS_PATH}} OUTPUT_PATH={{OUTPUT_PATH}}

  - name: infrastructure_enum
    cmds:
      - rayder -q -w workflows/infrastructure/infrastructure_enum.yaml ORGANIZATION={{ORGANIZATION}} OUTPUT_PATH={{OUTPUT_PATH}}

  - name: dns_enum
    cmds:
      - rayder -q -w workflows/subdomains/dns_enum.yaml OUTPUT_PATH={{OUTPUT_PATH}}

  - name: recursive_subdomain_enum
    cmds:
      - rayder -q -w workflows/subdomains/recursive_subdomain_enum.yaml OUTPUT_PATH={{OUTPUT_PATH}}

  - name: subdomain_resolution
    cmds:
      - rayder -q -w workflows/subdomains/subdomain_resolution.yaml OUTPUT_PATH={{OUTPUT_PATH}}

  - name: content_enumeration
    cmds:
      - rayder -q -w workflows/content/content_enumeration.yaml OUTPUT_PATH={{OUTPUT_PATH}}
  
  - name: javascript_enum
    cmds:
      - echo "Recursive JavaScript Enumeration..."

  - name: recursive_content_enum
    cmds:
      - echo "Recursive Content Enumeration..."

  - name: recursive_javascript_enum
    cmds:
      - echo "Recursive JavaScript Enumeration..."

  
