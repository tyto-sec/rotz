vars:
  FUZZING_OUTPUT_PATH: ${ROOT}/output/tesla/content/fuzzing
  GIT_OUTPUT_PATH: ${ROOT}/output/tesla/content/fuzzing/git
  CEWL_OUTPUT_PATH: ${ROOT}/output/tesla/content/wordlists/cewl
  WORDLISTS_OUTPUT_PATH: ${ROOT}/output/tesla/content/wordlists
  
  LIVE_SUBDOOMAINS_FILE: ${ROOT}/output/tesla/subs/all.live.subs.txt
  SUBDOMAIN_WORDLIST: ${ROOT}/wordlists/subdomains/subdomains-top1million-5000.txt
  DIRECTORY_WORDLIST: ${ROOT}/wordlists/directories/fuzz-Bo0oM.txt

  PATH_WORDLIST: ${ROOT}/output/tesla/content/wordlists/all.paths.txt
  WORDS_WORDLIST: ${ROOT}/output/tesla/content/wordlists/all.words.txt
  
  ALL_URLS_FILE: ${ROOT}/output/tesla/content/urls/all.urls.txt

  FUZZING_WORKFLOWS_FOLDER: ${ROOT}/workflows/fuzzing
  FUZZING_SCRIPTS_FOLDER: ${ROOT}/workflows/fuzzing/src
  FUZZING_ACTIVE: true
  FUZZING_NOTIFY: false

parallel: false
modules: 

  - name: create_dirs
    cmds:
      - |
        mkdir -p {{FUZZING_OUTPUT_PATH}} && mkdir -p {{WORDLISTS_OUTPUT_PATH}} && mkdir -p {{FUZZING_OUTPUT_PATH}}/git

  - name: fuzzing_parallel
    cmds:
      - rayder -q -w {{FUZZING_WORKFLOWS_FOLDER}}/fuzzing_parallel.yaml FUZZING_OUTPUT_PATH={{FUZZING_OUTPUT_PATH}} GIT_OUTPUT_PATH={{GIT_OUTPUT_PATH}} CEWL_OUTPUT_PATH={{CEWL_OUTPUT_PATH}} WORDLISTS_OUTPUT_PATH={{WORDLISTS_OUTPUT_PATH}} LIVE_SUBDOOMAINS_FILE={{LIVE_SUBDOOMAINS_FILE}} SUBDOMAIN_WORDLIST={{SUBDOMAIN_WORDLIST}} DIRECTORY_WORDLIST={{DIRECTORY_WORDLIST}} PATH_WORDLIST={{PATH_WORDLIST}} WORDS_WORDLIST={{WORDS_WORDLIST}} ALL_URLS_FILE={{ALL_URLS_FILE}} FUZZING_ACTIVE={{FUZZING_ACTIVE}} FUZZING_NOTIFY={{FUZZING_NOTIFY}} FUZZING_SCRIPTS_FOLDER={{FUZZING_SCRIPTS_FOLDER}} FUZZING_WORKFLOWS_FOLDER={{FUZZING_WORKFLOWS_FOLDER}}