vars:
  OUTPUT_PATH: output/vuln
  LIVE_SUBS: output/vuln/subs/all.live.subs.txt
  FUZZING_URLS: output/vuln/content/urls/fuzzing/ffuf.urls.txt
  PATH_WORDLIST: output/vuln/content/wordlists/all.paths.txt
  WORDS_WORDLIST: output/vuln/content/wordlists/fuzzing.word.list
  SUBDOMAINS_WORDLIST: wordlists/subdomains/subdomains-top1million-5000.txt
  ACTIVE: true
  NOTIFY: false

parallel: false
modules: 

  - name: create_dirs
    cmds:
      - |
        mkdir -p {{OUTPUT_PATH}}/content/urls/fuzzing

  - name: cewl_wordlist_generation
    cmds:
      - bash workflows/fuzzing/src/cewl_wordlist_generation.sh {{LIVE_SUBS}} {{OUTPUT_PATH}}

  - name: extract_words_from_paths
    cmds:
      - bash workflows/fuzzing/src/extract_words_from_paths.sh {{PATH_WORDLIST}} {{OUTPUT_PATH}}

  - name: concatanate_wordlists
    cmds:
      - cat {{OUTPUT_PATH}}/content/wordlists/cewl.word.list {{OUTPUT_PATH}}/content/wordlists/paths.word.list | anew {{OUTPUT_PATH}}/content/wordlists/fuzzing.word.list

  - name: gobuster_fuzzing
    cmds:
      - if {{ACTIVE}}; then bash workflows/fuzzing/src/gobuster_fuzzing.sh {{LIVE_SUBS}} {{OUTPUT_PATH}} {{WORDS_WORDLIST}} {{NOTIFY}}; fi
  
  - name: vhost_fuzzing
    cmds:
      - if {{ACTIVE}}; then bash workflows/fuzzing/src/gobuster_vhost_fuzzing.sh {{LIVE_SUBS}} {{OUTPUT_PATH}} {{SUBDOMAINS_WORDLIST}} {{NOTIFY}}; fi

  - name: git_enum
    cmds:
      - mkdir -p {{OUTPUT_PATH}}/content/git && if {{ACTIVE}}; goop -l {{LIVE_SUBS}} -f {{OUTPUT_PATH}}/content/git; fi