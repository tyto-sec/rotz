vars:
  INPUT_DOMAINS: ${ROOT}/input/tesla/domains.txt
  INPUT_ORGANIZATION: "Tesla"
  IPS_OUTPUT_PATH: ${ROOT}/output/tesla/ips
  SUBDOMAIN_OUTPUT_PATH: ${ROOT}/output/tesla/subs
  ORGANIZATION_NOTIFY: false
  ORGANIZATION_WORKFLOWS_FOLDER: ${ROOT}/workflows/organization
  ORGANIZATION_SCRIPTS_FOLDER: ${ROOT}/workflows/organization/src

parallel: false
modules:

  - name: create_dirs
    cmds:
      - |
        mkdir -p {{SUBDOMAIN_OUTPUT_PATH}}
        touch {{SUBDOMAIN_OUTPUT_PATH}}/all.subs.txt
        mkdir -p {{IPS_OUTPUT_PATH}}
        touch {{IPS_OUTPUT_PATH}}/all.ips.txt

  - name: asn_discovery
    cmds:
      - python3 {{ORGANIZATION_SCRIPTS_FOLDER}}/asn_discovery.py "{{INPUT_ORGANIZATION}}" "{{IPS_OUTPUT_PATH}}" "{{ORGANIZATION_NOTIFY}}"
