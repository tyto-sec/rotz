version: "3.8"

services:
  test-environment:
    image: hunter_debug
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: hunter_debug
    env_file:
      - .env
    volumes:
      - ./input:/app/input
      - ./workflows:/app/workflows
      - ./wordlists:/app/wordlists
      - ./output:/app/output
      - ./gf:/app/gf
      - ./scripts:/app/scripts
    stdin_open: true
    tty: true
    command: /bin/bash
