version: "3.8"

services:
  test-environment:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: hunter_debug
    env_file:
      - .env
    volumes:
      - ./domains:/app/domains
      - ./workflows:/app/workflows
      - ./wordlists:/app/wordlists
      - ./output:/app/output
    stdin_open: true
    tty: true
    command: /bin/bash
